[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000

# Deploy context configuration
[context.production]
  command = "npm run build"
  publish = "dist"

[context.dev]
  command = "npm run build"
  publish = "dist"
  # Dev branch will NOT auto-deploy (manual deployment only)

# SPA fallback for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false


[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000

# Deploy context configuration
[context.production]
  command = "npm run build"
  publish = "dist"

[context.dev]
  command = "npm run build"
  publish = "dist"
  # Dev branch will NOT auto-deploy (manual deployment only)

# API routing (must come BEFORE SPA fallback)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback (catches everything else)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

